name: Telegram Notify

on:
  # Triggered live from the deployed app (workflow_dispatch API call) when a
  # team member clicks "Send" or a CRM event fires (new lead, deal won, etc.).
  workflow_dispatch:
    inputs:
      message:
        description: 'Fully formatted HTML message to relay to Telegram'
        required: true
        type: string
      chat_id:
        description: 'Optional chat ID override (defaults to the NOTIFY_CHAT_ID secret)'
        required: false
        type: string
  # Daily heartbeat — confirms the pipeline is alive even if nobody opens the app.
  schedule:
    - cron: '0 1 * * *' # 09:00 Malaysia time (UTC+8)

permissions:
  contents: read

jobs:
  relay-message:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NOTIFY_CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
          CHAT_ID_OVERRIDE: ${{ github.event.inputs.chat_id }}
          MESSAGE: ${{ github.event.inputs.message }}
        run: node scripts/send-telegram-message.mjs

  daily-heartbeat:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send daily heartbeat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NOTIFY_CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
        run: node scripts/send-heartbeat.mjs
